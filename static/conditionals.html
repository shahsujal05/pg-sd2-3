<!DOCTYPE html>
<html>
<head>
    <title>Conditionals</title>
</head>
<body>
    <h1>Student Year</h1>
    <div id="output"></div>

    <script>
        var studentYear = 2; // Change this value to test: 1, 2, or 3

        // --- Using if / else if / else ---
        var messageIf = "";
        if (studentYear === 1) {
            messageIf = "You are in year 1";
        } else if (studentYear === 2) {
            messageIf = "You are in year 2";
        } else if (studentYear === 3) {
            messageIf = "You are in year 3";
        } else {
            messageIf = "Unknown year";
        }
        document.write("<p>if/else result: " + messageIf + "</p>");

        // --- Using switch ---
        var messageSwitch = "";
        switch (studentYear) {
            case 1:
                messageSwitch = "You are in year 1";
                break;
            case 2:
                messageSwitch = "You are in year 2";
                break;
            case 3:
                messageSwitch = "You are in year 3";
                break;
            default:
                messageSwitch = "Unknown year";
        }
        document.write("<p>switch result: " + messageSwitch + "</p>");

        // --- For loop: numbers 1 to 20 ---
        document.write("<h2>For Loop (1-20):</h2>");
        for (var i = 1; i <= 20; i++) {
            document.write(i + " ");
        }

        // --- While loop: numbers 1 to 20 ---
        document.write("<h2>While Loop (1-20):</h2>");
        var j = 1;
        while (j <= 20) {
            document.write(j + " ");
            j++;
        }

        // --- For...of loop over names array ---
        document.write("<h2>Names Array Loop:</h2>");
        var names = ["Sujal", "Lisa", "Arturo", "Kevin"];
        for (var n of names) {
            document.write(n + "<br>");
        }
    </script>
</body>
</html>
