<!DOCTYPE html>
<html>
<head>
    <title>Buttons!</title>
    <script>
        function msg() {
            document.write("You clicked the button!");
        }

        function msg2() {
            document.write("Not that button!");
        }
    </script>
</head>
<body>
    <h1>Click the button!</h1>
    <input type="button" value="Click Me!" onclick="msg()">
    <input type="button" value="Other Button" onclick="msg2()">
</body>
</html>
